<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Editor Harness</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f6fb; }
    #editor-host { width: 880px; max-width: 96vw; margin: 20px auto; }
    .page-editor {
      min-height: 120px;
      padding: 12px;
      margin: 0 0 10px 0;
      border: 1px solid #d5d9e4;
      border-radius: 8px;
      background: #fff;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .verdict-highlight {
      background: rgba(255, 214, 10, 0.45);
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div id="editor-host">
    <div id="editor"></div>
  </div>
  <script>
    const state = {
      text: "",
      pageCharBudget: 900,
      pageSlices: [],
    };

    function normalizeText(value) {
      return String(value || "").replace(/\r\n/g, "\n");
    }

    function collectTextNodes(root) {
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
      const nodes = [];
      let node = walker.nextNode();
      while (node) {
        const value = node.nodeValue || "";
        if (value.length > 0) nodes.push(node);
        node = walker.nextNode();
      }
      return nodes;
    }

    function positionForOffset(nodes, absoluteOffset) {
      if (!nodes.length) return null;
      let consumed = 0;
      for (const node of nodes) {
        const value = node.nodeValue || "";
        const next = consumed + value.length;
        if (absoluteOffset <= next) {
          return { node, offset: Math.max(0, Math.min(value.length, absoluteOffset - consumed)) };
        }
        consumed = next;
      }
      const tail = nodes[nodes.length - 1];
      return { node: tail, offset: (tail.nodeValue || "").length };
    }

    function offsetForPosition(root, node, offset) {
      if (!root || !node) return null;
      const range = document.createRange();
      range.selectNodeContents(root);
      try {
        range.setEnd(node, offset);
      } catch (_error) {
        return null;
      }
      return range.toString().length;
    }

    function splitPages(text, budget) {
      if (!text.length) return [{ start: 0, end: 0, text: "" }];
      const pages = [];
      const total = text.length;
      let cursor = 0;
      while (cursor < total) {
        let end = Math.min(total, cursor + budget);
        if (end < total) {
          const min = Math.max(cursor + 1, end - 180);
          for (let idx = end; idx > min; idx -= 1) {
            const ch = text[idx - 1];
            if (ch === "\n" || /\s/.test(ch) || /[,.!?;:]/.test(ch)) {
              end = idx;
              break;
            }
          }
        }
        if (end <= cursor) end = Math.min(total, cursor + budget);
        if (end <= cursor) end = cursor + 1;
        pages.push({ start: cursor, end, text: text.slice(cursor, end) });
        cursor = end;
      }
      return pages;
    }

    function getSelectionOffsets() {
      const editor = document.getElementById("editor");
      const selection = window.getSelection();
      if (!editor || !selection || selection.rangeCount === 0) return null;
      const range = selection.getRangeAt(0);
      if (!editor.contains(range.startContainer) || !editor.contains(range.endContainer)) return null;
      const start = offsetForPosition(editor, range.startContainer, range.startOffset);
      const end = offsetForPosition(editor, range.endContainer, range.endOffset);
      if (!Number.isInteger(start) || !Number.isInteger(end)) return null;
      return { start: Math.min(start, end), end: Math.max(start, end) };
    }

    function setSelectionOffsets(start, end) {
      const editor = document.getElementById("editor");
      const nodes = collectTextNodes(editor);
      const startPos = positionForOffset(nodes, start);
      const endPos = positionForOffset(nodes, end);
      if (!startPos || !endPos) return false;
      const range = document.createRange();
      range.setStart(startPos.node, startPos.offset);
      range.setEnd(endPos.node, endPos.offset);
      const selection = window.getSelection();
      if (!selection) return false;
      selection.removeAllRanges();
      selection.addRange(range);
      return true;
    }

    function renderEditor(preserveSelection = true) {
      const editor = document.getElementById("editor");
      const saved = preserveSelection ? getSelectionOffsets() : null;
      state.pageSlices = splitPages(state.text, state.pageCharBudget);
      editor.innerHTML = "";
      const fragment = document.createDocumentFragment();
      state.pageSlices.forEach((page) => {
        const div = document.createElement("div");
        div.className = "page-editor";
        div.textContent = page.text;
        if (page.text === "" || page.text.endsWith("\n")) {
          div.appendChild(document.createElement("br"));
        }
        fragment.appendChild(div);
      });
      editor.appendChild(fragment);
      if (saved && Number.isInteger(saved.start) && Number.isInteger(saved.end)) {
        setSelectionOffsets(saved.start, saved.end);
      }
    }

    function applyHighlight(start, end) {
      const editor = document.getElementById("editor");
      const nodes = collectTextNodes(editor);
      const startPos = positionForOffset(nodes, start);
      const endPos = positionForOffset(nodes, end);
      if (!startPos || !endPos) return "";
      const range = document.createRange();
      range.setStart(startPos.node, startPos.offset);
      range.setEnd(endPos.node, endPos.offset);
      const span = document.createElement("span");
      span.className = "verdict-highlight";
      try {
        range.surroundContents(span);
      } catch (_error) {
        const fragment = range.extractContents();
        span.appendChild(fragment);
        range.insertNode(span);
      }
      return span.textContent || "";
    }

    window.__setText = (text) => {
      state.text = normalizeText(text);
      renderEditor(false);
      return state.pageSlices.length;
    };
    window.__getText = () => state.text;
    window.__setSelectionOffsets = (start, end) => setSelectionOffsets(start, end);
    window.__getSelectionOffsets = () => getSelectionOffsets();
    window.__repaginate = () => renderEditor(true);
    window.__pageCount = () => state.pageSlices.length;
    window.__applyHighlight = (start, end) => applyHighlight(start, end);
    window.__highlightedText = () => {
      const items = Array.from(document.querySelectorAll(".verdict-highlight"));
      return items.map((item) => item.textContent || "").join("");
    };

    window.addEventListener("resize", () => {
      const width = Math.max(700, window.innerWidth || 1200);
      state.pageCharBudget = Math.max(500, Math.round(width * 0.85));
      renderEditor(true);
    });
  </script>
</body>
</html>
